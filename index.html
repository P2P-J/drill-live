<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drill Live</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000000;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
      }
      /* Electron 컨트롤 패널 — window.electronAPI 있을 때만 보임 (웹은 영향 X) */
      #electron-controls {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 9999;
        background: rgba(10, 14, 26, 0.92);
        border: 2px solid #FFD700;
        border-radius: 12px;
        padding: 12px 14px;
        font-family: 'Arial Black', Arial, sans-serif;
        color: #FFFFFF;
        width: 280px;
        display: none;
        user-select: none;
      }
      #electron-controls h3 {
        margin: 0 0 8px 0;
        font-size: 14px;
        color: #FFD700;
      }
      #electron-controls input {
        width: 100%;
        padding: 6px 8px;
        box-sizing: border-box;
        background: #1A1F2E;
        border: 1px solid #333A4A;
        color: #FFFFFF;
        border-radius: 6px;
        font-size: 12px;
        margin-bottom: 6px;
        font-family: monospace;
      }
      #electron-controls button {
        padding: 6px 14px;
        margin-right: 6px;
        background: #FFD700;
        color: #12172A;
        border: 0;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 12px;
      }
      #electron-controls button.stop {
        background: #E91E63;
        color: #fff;
      }
      #electron-controls button:hover {
        opacity: 0.85;
      }
      #electron-controls .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        margin-top: 10px;
      }
      #electron-controls .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #666;
        display: inline-block;
      }
      #electron-controls .dot.connecting { background: #FFC107; }
      #electron-controls .dot.connected { background: #4CAF50; }
      #electron-controls .dot.error { background: #F44336; }
      #electron-controls .dot.ended { background: #9E9E9E; }
      #electron-controls .err {
        font-size: 10px;
        color: #FF8A65;
        margin-top: 6px;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 60px;
        overflow-y: auto;
      }
      #electron-controls .hint {
        font-size: 10px;
        color: #8C95A3;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <!-- Electron 환경에서만 표시되는 컨트롤 패널 -->
    <div id="electron-controls">
      <h3>📡 YouTube Live 연결</h3>
      <input id="yt-url" placeholder="https://youtube.com/watch?v=..." />
      <button id="yt-start">Start</button>
      <button id="yt-stop" class="stop">Stop</button>
      <div class="status">
        <span class="dot" id="yt-dot"></span>
        <span id="yt-state">idle</span>
      </div>
      <div class="err" id="yt-err"></div>
      <div class="hint">OBS Window Capture로 송출 시 이 패널은 Crop으로 제외하세요.</div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script>
      // Electron 환경 감지 후 컨트롤 패널 활성화 (웹에선 그대로 숨김)
      if (window.electronAPI) {
        const panel = document.getElementById('electron-controls');
        panel.style.display = 'block';

        const dot = document.getElementById('yt-dot');
        const stateEl = document.getElementById('yt-state');
        const errEl = document.getElementById('yt-err');
        const apply = (status) => {
          dot.className = 'dot ' + (status.state || '');
          stateEl.textContent = status.liveId
            ? `${status.state} — ${status.liveId}`
            : (status.state || 'idle');
          errEl.textContent = status.lastError || '';
        };
        window.electronAPI.onStatusChange(apply);
        window.electronAPI.getStatus().then(apply);

        document.getElementById('yt-start').onclick = async () => {
          const url = document.getElementById('yt-url').value.trim();
          if (!url) return;
          await window.electronAPI.startYoutube(url);
        };
        document.getElementById('yt-stop').onclick = async () => {
          await window.electronAPI.stopYoutube();
        };
        // Enter로도 Start
        document.getElementById('yt-url').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') document.getElementById('yt-start').click();
        });
      }
    </script>
  </body>
</html>
